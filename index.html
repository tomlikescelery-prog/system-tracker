<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>System Tracker</title>
<style>
  body {
    font-family: Arial, sans-serif;
    background: #0f0f14;
    color: #fff;
    margin: 0;
    padding: 20px;
  }
  h1 { text-align: center; }
  .container { max-width: 800px; margin: auto; }

  input, textarea, button {
    width: 100%;
    padding: 10px;
    margin: 5px 0;
    border-radius: 8px;
    border: none;
  }

  button {
    background: #6c5ce7;
    color: white;
    cursor: pointer;
  }

  button:hover {
    background: #5a4bd6;
  }

  .card {
    background: #1c1c28;
    padding: 10px;
    margin: 10px 0;
    border-radius: 10px;
  }

  .row {
    display: flex;
    gap: 10px;
  }

  .row > * {
    flex: 1;
  }
</style>
</head>
<body>

<div class="container">
  <h1>System Tracker</h1>

  <h2>Add Member</h2>
  <input id="name" placeholder="Name" />
  <input id="role" placeholder="Role / Notes (optional)" />
  <button onclick="addMember()">Add Member</button>

  <h2>Members</h2>
  <div id="members"></div>

  <h2>Log Switch</h2>
  <input id="switchName" placeholder="Who switched in?" />
  <button onclick="logSwitch()">Log Switch</button>

  <h2>Switch History</h2>
  <div id="history"></div>

  <h2>Quick Notes</h2>
  <textarea id="note" placeholder="Write a note..."></textarea>
  <button onclick="saveNote()">Save Note</button>

  <div id="notes"></div>
</div>

<script>
let members = JSON.parse(localStorage.getItem("members") || "[]");
let history = JSON.parse(localStorage.getItem("history") || "[]");
let notes = JSON.parse(localStorage.getItem("notes") || "[]");

function saveAll() {
  localStorage.setItem("members", JSON.stringify(members));
  localStorage.setItem("history", JSON.stringify(history));
  localStorage.setItem("notes", JSON.stringify(notes));
  render();
}

function addMember() {
  const name = document.getElementById("name").value;
  const role = document.getElementById("role").value;

  if (!name) return;

  members.push({ name, role });
  document.getElementById("name").value = "";
  document.getElementById("role").value = "";
  saveAll();
}

function logSwitch() {
  const who = document.getElementById("switchName").value;
  if (!who) return;

  history.unshift({ who, time: new Date().toLocaleString() });
  document.getElementById("switchName").value = "";
  saveAll();
}

function saveNote() {
  const text = document.getElementById("note").value;
  if (!text) return;

  notes.unshift({ text, time: new Date().toLocaleString() });
  document.getElementById("note").value = "";
  saveAll();
}

function render() {
  document.getElementById("members").innerHTML =
    members.map((m, i) =>
      `<div class="card"><b>${m.name}</b><br>${m.role || ""}<br>
      <button onclick="deleteMember(${i})">Delete</button></div>`
    ).join("");

  document.getElementById("history").innerHTML =
    history.map(h =>
      `<div class="card"><b>${h.who}</b><br>${h.time}</div>`
    ).join("");

  document.getElementById("notes").innerHTML =
    notes.map(n =>
      `<div class="card">${n.text}<br><small>${n.time}</small></div>`
    ).join("");
}

function deleteMember(i) {
  members.splice(i, 1);
  saveAll();
}

render();
</script>

</body>
</html>
